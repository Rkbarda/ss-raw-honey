<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S Raw Honey | Himachal Ka Jadoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --honey: #f4b400;
            --honey-light: #ffcc33;
            --dark: #072a23;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            /* HONEYCOMB PATTERN */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0NiIgdmlld0JveD0iMCAwIDQwIDQ2Ij48cGF0aCBkPSJNMjAgMEw0MCAxMS41VjM0LjVMMjAgNDZMMCAzNC41VjExLjVMMjAgMFoiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNDQsMTgwLDAsMC4wNSKSIgc3Ryb2tlLXdpZHRoPSIxIi8+PC9zdmc+');
            background-size: 60px;
            color: #fff;
            overflow-x: hidden;
        }

        /* BANNER CONTAINER */
        .hero-area {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: visible;
        }

        /* THE DRIPPING HONEY */

            left: 0;
            width: 100%;

            mask-repeat: no-repeat;

        /* 3D GLOSS EFFECT */
        .honey-drip::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, transparent 40%, rgba(255,255,255,0.2) 90%);
            pointer-events: none;
        }

        @keyframes pourHoney {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(0); }
        }

        /* HERO CONTENT */
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding-top: 60px;
        }

        .hero-content h1 { font-size: 90px; color: #000; line-height: 0.8; }
        .hero-content h2 { letter-spacing: 10px; font-weight: 300; text-transform: uppercase; color: #fff; }

        /* THE JAR (Above everything) */
        .hero-jar {
            position: absolute;
            left: 5%;
            top: 40px;
            width: 250px;
            z-index: 25;
            transform: rotate(-10deg);
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
            animation: jarSplash 2s ease-out;
        }

        @keyframes jarSplash {
            0% { transform: scale(0.5) rotate(0deg); opacity: 0; }
            100% { transform: scale(1) rotate(-10deg); opacity: 1; }
        }

        /* PRODUCTS SECTION */
        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        .card {
            background: #fff;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            transition: 0.3s;
            color: #333;
        }

        .card:hover { transform: translateY(-15px); }
        .card img { width: 100%; max-width: 180px; margin-bottom: 25px; }
        .price { color: var(--green); font-weight: 700; font-size: 1.6rem; margin: 15px 0; }

        .btn-order {
            background: var(--whatsapp);
            color: #fff;
            text-decoration: none;
            padding: 14px 35px;
            border-radius: 50px;
            font-weight: 600;
            display: inline-block;
        }

        .notice-tag {
            position: absolute; top: 20px; right: 20px;
            background: #000; color: #fff; padding: 10px 15px;
            font-size: 11px; font-weight: 700; border-radius: 5px; z-index: 50;
        }
    </style>
</head>
<body>

    <div class="hero-area">
        <div class="notice-tag">NOTICE:<br>DON'T USE WET SPOON</div>
        
        <img src="assets/Jar1.png" class="hero-jar" alt="S&S Honey Jar">

        <div class="honey-drip">
            <div class="hero-content">
                <p style="color: #000; font-weight: 800; letter-spacing: 5px; margin-bottom: 10px;">PREMIUM RAW HONEY</p>
                <h1 style="font-family: serif;">S&S</h1>
                <h2>Raw Honey</h2>
            </div>
        </div>
    </div>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 60px; letter-spacing: 2px;">OUR PRODUCTS</h2>
        <div class="product-grid">
            <div class="card">
                <img src="assets/Jar1.png" alt="Forest Honey">
                <h3>Organic Forest Honey</h3>
                <div class="price">₹550</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>
            <div class="card">
                <img src="assets/Jar2.png" alt="Mountain Bloom">
                <h3>Mountain Bloom - 500g</h3>
                <div class="price">₹580</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>
            <div class="card">
                <img src="assets/Jar3.png" alt="Wildflower Comb">
                <h3>Wildflower Comb - 300g</h3>
                <div class="price">₹620</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>
        </div>
    </div>

    <div style="text-align: center; padding: 60px 20px;">
        <h2 style="color: var(--honey); font-size: 2.5rem; margin-bottom: 10px;">शहद नहीं, हिमाचल का जादू।</h2>
        <p style="font-style: italic; opacity: 0.6;">SHAHAD NAHI, HIMACHAL KA JADOO.</p>
    </div>

</body>
</html>
