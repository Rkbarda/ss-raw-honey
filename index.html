<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&S Raw Honey</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --honey:#f4b400;
  --forest:#072a23;
}

*{box-sizing:border-box;}
body{margin:0;font-family:Poppins,sans-serif;overflow-x:hidden;}

/* ================= HERO ================= */
.hero{
  position:relative;
  background:var(--honey);
  padding-bottom:0;
}

/* NOTICE */
.notice{
  position:absolute;
  top:25px;
  right:30px;
  background:#000;
  color:#fff;
  font-size:10px;
  padding:10px 14px;
  border-radius:4px;
  font-weight:700;
  z-index:20;
}

/* JAR */
.hero-jar{
  position:absolute;
  left:6%;
  top:80px;
  width:260px;
  transform:rotate(-12deg);
  z-index:15;
  filter:drop-shadow(0 18px 30px rgba(0,0,0,.4));
}

/* SPOON */
.spoon{
  position:absolute;
  top:30px;
  right:12%;
  width:260px;
  z-index:15;
}

/* BRAND */
.brand{
  text-align:center;
  padding:140px 20px 120px;
}

.brand p{
  letter-spacing:5px;
  font-weight:700;
}

.brand h1{
  font-family:'Playfair Display',serif;
  font-size:96px;
  margin:10px 0;
}

.brand h2{
  letter-spacing:14px;
  font-size:18px;
}

/* ================= DRIP ================= */
.drip{
  position:relative;
  height:160px;
  background:var(--forest);
}

.drip::before{
  content:'';
  position:absolute;
  top:-160px;
  left:0;
  width:100%;
  height:160px;
  background:var(--honey);

  -webkit-mask-image:url('data:image/svg+xml;utf8,\
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" preserveAspectRatio="none">\
<path d="M0,0 H1200 V80 \
C1100,80 1100,140 1000,140 \
C900,140 900,80 800,80 \
C700,80 700,140 600,140 \
C500,140 500,80 400,80 \
C300,80 300,140 200,140 \
C100,140 100,80 0,80 Z"/>\
</svg>');
  -webkit-mask-size:100% 100%;
}

/* ================= GREEN SECTION ================= */
.green{
  height:260px;
  background:
    linear-gradient(rgba(0,0,0,.1),rgba(0,0,0,.1)),
    url('data:image/svg+xml;utf8,\
<svg xmlns="http://www.w3.org/2000/svg" width="56" height="32">\
<path d="M28 0L56 16L28 32L0 16Z" fill="none" stroke="rgba(244,180,0,.08)"/>\
</svg>');
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .hero-jar{width:180px;top:100px;}
  .spoon{width:180px;top:50px;}
  .brand h1{font-size:64px;}
  .brand h2{letter-spacing:8px;}
  .drip{height:120px;}
  .drip::before{top:-120px;height:120px;}
}
</style>
</head>

<body>

<section class="hero">

  <div class="notice">NOTICE:<br>DON'T USE WET SPOON</div>

  <img src="assets/Jar1.png" class="hero-jar" alt="Honey Jar">

  <img src="assets/spoon.png" class="spoon" alt="Spoon">

  <div class="brand">
    <p>PREMIUM RAW HONEY</p>
    <h1>S&amp;S</h1>
    <h2>RAW HONEY</h2>
  </div>

</section>

<div class="drip"></div>
<div class="green"></div>

</body>
</html>
