<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&S Raw Honey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --honey:#FFC107;
  --green:#0f3d33;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--green);
  color:#fff;
}

/* ================= HEADER ================= */
.banner{
  position:relative;
  height:480px;
  background:
    url("data:image/svg+xml;utf8,
    <svg xmlns='http://www.w3.org/2000/svg' width='300' height='300' viewBox='0 0 300 300'>
      <g fill='%23FFC107'>
        <path d='M0 0h300v60H0z'/>
        <path d='M40 60c0 30 20 30 20 60s-20 30-20 60'/>
        <circle cx='80' cy='140' r='18'/>
        <rect x='120' y='110' rx='20' ry='20' width='60' height='80'/>
        <path d='M230 130l20 10-20 10z'/>
        <g transform='translate(50 200)'>
          <polygon points='20,0 40,10 40,30 20,40 0,30 0,10'/>
        </g>
        <g transform='translate(90 200)'>
          <polygon points='20,0 40,10 40,30 20,40 0,30 0,10'/>
        </g>
        <g transform='translate(130 200)'>
          <polygon points='20,0 40,10 40,30 20,40 0,30 0,10'/>
        </g>
      </g>
    </svg>") repeat,
    var(--honey);
  background-size:300px 300px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* Bottom green cut */
.banner::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:140px;
  background:var(--green);
  border-radius:120px 120px 0 0;
}

/* Content */
.banner-content{
  position:relative;
  z-index:3;
}

.banner small{
  letter-spacing:4px;
  color:#000;
}

.banner h1{
  font-size:56px;
  margin:10px 0 5px;
  color:#fff;
}

.banner h2{
  letter-spacing:6px;
  font-size:14px;
}

/* Jar */
.banner-jar{
  position:absolute;
  left:60px;
  bottom:40px;
  width:220px;
  z-index:4;
  filter:drop-shadow(0 15px 20px rgba(0,0,0,.4));
}

/* ================= PRODUCTS ================= */
section{
  padding:70px 20px;
  text-align:center;
}

.products{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
}

.card{
  background:#fff;
  color:#000;
  border-radius:22px;
  padding:28px;
  box-shadow:0 18px 30px rgba(0,0,0,.35);
}

.card img{
  width:140px;
}

.price{
  color:#1f7a4a;
  font-weight:600;
  margin:10px 0 18px;
}

.btn{
  background:#25D366;
  color:#fff;
  text-decoration:none;
  padding:12px 26px;
  border-radius:30px;
  font-size:14px;
}

/* ================= FOOTER ================= */
footer{
  background:#0b2e26;
  padding:30px 20px;
  text-align:center;
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .banner{height:420px}
  .banner-jar{width:150px; left:20px}
  .banner h1{font-size:38px}
}
</style>
</head>

<body>

<div class="banner">
  <img src="assets/Jar1.png" class="banner-jar">
  <div class="banner-content">
    <small>PREMIUM RAW HONEY</small>
    <h1>S&amp;S</h1>
    <h2>RAW HONEY</h2>
  </div>
</div>

<section>
  <h2>Our Products</h2>
  <div class="products">
    <div class="card">
      <img src="assets/Jar1.png">
      <h3>Forest Raw Honey</h3>
      <div class="price">₹550</div>
      <a class="btn" href="#">Order Now</a>
    </div>
    <div class="card">
      <img src="assets/Jar2.png">
      <h3>Wildflower Honey</h3>
      <div class="price">₹580</div>
      <a class="btn" href="#">Order Now</a>
    </div>
    <div class="card">
      <img src="assets/Jar3.png">
      <h3>Mountain Honey</h3>
      <div class="price">₹620</div>
      <a class="btn" href="#">Order Now</a>
    </div>
  </div>
</section>

<footer>
  Pure Raw Honey from Himachal Pradesh<br>
  <small>© S&S Raw Honey</small>
</footer>

</body>
</html>
