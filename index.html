<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&S Raw Honey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --yellow:#f4b400;
  --dark:#0f3d33;
  --green:#1f7a4a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--dark);
  color:#fff;
}

/* ================= BANNER ================= */
.banner{
  position:relative;
  height:420px;
  background:linear-gradient(
    to bottom,
    #f7c531 0%,
    #f4b400 55%,
    #0f3d33 55%,
    #0f3d33 100%
  );
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* Honey drip */
.banner::after{
  content:"";
  position:absolute;
  top:55%;
  left:0;
  width:100%;
  height:120px;
  background:
    radial-gradient(circle at 8% 0%, var(--yellow) 45%, transparent 46%),
    radial-gradient(circle at 25% 0%, var(--yellow) 50%, transparent 51%),
    radial-gradient(circle at 42% 0%, var(--yellow) 40%, transparent 41%),
    radial-gradient(circle at 60% 0%, var(--yellow) 48%, transparent 49%),
    radial-gradient(circle at 78% 0%, var(--yellow) 42%, transparent 43%),
    radial-gradient(circle at 92% 0%, var(--yellow) 38%, transparent 39%);
}

/* Notice */
.notice{
  position:absolute;
  top:20px;
  right:20px;
  background:#123b2a;
  color:#fff;
  padding:10px 14px;
  font-size:12px;
  border-radius:6px;
  z-index:3;
}

/* Banner content */
.banner-content{
  position:relative;
  z-index:2;
}

.banner small{
  letter-spacing:4px;
  color:#000;
  font-weight:500;
}

.banner h1{
  margin:14px 0 6px;
  font-size:48px;
  color:var(--yellow);
  font-weight:700;
}

.banner h2{
  margin:0;
  font-size:14px;
  letter-spacing:5px;
}

/* Jar image */
.banner-jar{
  position:absolute;
  left:60px;
  bottom:70px;
  width:210px;
  transform:rotate(-12deg);
  z-index:2;
}

/* ================= PRODUCTS ================= */
section{
  padding:60px 20px;
  text-align:center;
}

.products{
  max-width:1100px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
}

.card{
  background:#fff;
  color:#000;
  border-radius:20px;
  padding:28px 22px 32px;
  box-shadow:0 15px 30px rgba(0,0,0,.3);
}

.card h3{
  margin:0 0 8px;
}

.price{
  color:var(--green);
  font-weight:600;
  margin-bottom:16px;
}

.btn{
  display:inline-block;
  background:#25D366;
  color:#fff;
  text-decoration:none;
  padding:12px 24px;
  border-radius:30px;
  font-size:14px;
}

/* ================= TAGLINE ================= */
.tagline{
  font-size:18px;
  font-weight:600;
}

/* ================= FOOTER ================= */
footer{
  background:#0b2e26;
  padding:30px 20px;
  text-align:center;
  font-size:14px;
}

footer small{
  display:block;
  opacity:.8;
  margin-top:8px;
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .banner-jar{
    width:150px;
    left:20px;
    bottom:90px;
  }
  .banner h1{
    font-size:38px;
  }
}
</style>
</head>

<body>

<!-- ================= BANNER ================= -->
<div class="banner">

  <div class="notice">
    NOTICE:<br>DON'T USE WET SPOON
  </div>

  <img src="assets/jar1.png" class="banner-jar" alt="Raw Honey Jar">

  <div class="banner-content">
    <small>PREMIUM RAW HONEY</small>
    <h1>S&amp;S</h1>
    <h2>RAW HONEY</h2>
  </div>

</div>

<!-- ================= PRODUCTS ================= -->
<section>
  <h2>About Us</h2>

  <div class="products">

    <div class="card">
      <h3>Organic Forest Honey</h3>
      <div class="price">₹550</div>
      <a class="btn" href="https://wa.me/911234567890">Order on WhatsApp</a>
    </div>

    <div class="card">
      <h3>Mountain Bloom – 500g</h3>
      <div class="price">₹580</div>
      <a class="btn" href="https://wa.me/911234567890">Order on WhatsApp</a>
    </div>

    <div class="card">
      <h3>Wildflower Comb – 300g</h3>
