<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&S Raw Honey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --honey:#FFC107;
  --green:#0f3d33;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--green);
  color:#fff;
}

/* ================= HEADER ================= */
.banner{
  position:relative;
  height:460px;
  background:var(--green);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* TOP HONEY BLOCK */
.honey-top{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:210px;
  background:var(--honey);
  z-index:1;
}

/* DRIPS */
.honey-top span{
  position:absolute;
  bottom:-60px;
  width:70px;
  background:var(--honey);
  border-radius:0 0 50px 50px;
}

.honey-top span:nth-child(1){left:5%; height:90px}
.honey-top span:nth-child(2){left:15%; height:130px}
.honey-top span:nth-child(3){left:28%; height:100px}
.honey-top span:nth-child(4){left:42%; height:150px}
.honey-top span:nth-child(5){left:58%; height:110px}
.honey-top span:nth-child(6){left:72%; height:140px}
.honey-top span:nth-child(7){left:85%; height:95px}

/* Notice */
.notice{
  position:absolute;
  top:18px;
  right:18px;
  background:#0b2e26;
  padding:10px 14px;
  font-size:12px;
  border-radius:6px;
  z-index:5;
}

/* Banner content */
.banner-content{
  position:relative;
  z-index:4;
}

.banner small{
  letter-spacing:4px;
  color:#000;
}

.banner h1{
  margin:12px 0 4px;
  font-size:52px;
  color:#fff;
}

.banner h2{
  font-size:14px;
  letter-spacing:6px;
  color:#eaeaea;
}

/* Jar */
.banner-jar{
  position:absolute;
  left:60px;
  bottom:40px;
  width:220px;
  z-index:4;
  filter:drop-shadow(0 15px 20px rgba(0,0,0,.4));
}

/* ================= PRODUCTS ================= */
section{
  padding:70px 20px;
  text-align:center;
}

.products{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
}

.card{
  background:#fff;
  color:#000;
  border-radius:22px;
  padding:28px;
  box-shadow:0 18px 30px rgba(0,0,0,.35);
}

.card img{
  width:140px;
  margin-bottom:10px;
}

.price{
  color:#1f7a4a;
  font-weight:600;
  margin:10px 0 18px;
}

.btn{
  background:#25D366;
  color:#fff;
  text-decoration:none;
  padding:12px 26px;
  border-radius:30px;
  font-size:14px;
}

/* ================= WHATSAPP ================= */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  width:56px;
  height:56px;
  background:#25D366;
  color:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
  box-shadow:0 10px 20px rgba(0,0,0,.3);
}

/* ================= FOOTER ================= */
footer{
  background:#0b2e26;
  padding:30px 20px;
  text-align:center;
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .banner{height:420px}
  .banner-jar{width:150px; left:20px}
  .banner h1{font-size:38px}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="banner">

  <div class="honey-top">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <div class="notice">NOTICE<br>DON'T USE WET SPOON</div>

  <img src="assets/Jar1.png" class="banner-jar" alt="Honey Jar">

  <div class="banner-content">
    <small>PREMIUM RAW HONEY</small>
    <h1>S&amp;S</h1>
    <h2>RAW HONEY</h2>
  </div>

</div>

<!-- PRODUCTS -->
<section>
  <h2>Our Products</h2>

  <div class="products">
    <div class="card">
      <img src="assets/Jar1.png">
      <h3>Forest Raw Honey</h3>
      <div class="price">₹550</div>
      <a class="btn" href="#">Order Now</a>
    </div>

    <div class="card">
      <img src="assets/Jar2.png">
      <h3>Wildflower Honey</h3>
      <div class="price">₹580</div>
      <a class="btn" href="#">Order Now</a>
    </div>

    <div class="card">
      <img src="assets/Jar3.png">
      <h3>Mountain Honey</h3>
      <div class="price">₹620</div>
      <a class="btn" href="#">Order Now</a>
    </div>
  </div>
</section>

<footer>
  Pure Raw Honey from Himachal Pradesh<br>
  <small>© S&S Raw Honey</small>
</footer>

<a class="whatsapp" href="https://wa.me/911234567890">💬</a>

</body>
</html>
