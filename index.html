<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S Raw Honey | Himachal Ka Jadoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --honey-yellow: #f4b400;
            --dark-forest: #0b2e26;
            --whatsapp-green: #25D366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-forest);
            /* 1. ADVANCED HONEYCOMB CSS BACKGROUND */
            background-image: 
                linear-gradient(rgba(11, 46, 38, 0.9), rgba(11, 46, 38, 0.9)),
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1NiIgaGVpZ2h0PSIxMDAiIHZpZXdCb3g9IjAgMCA1NiAxMDAiPjxwYXRoIGQ9Ik0yOCA2NkwwIDUwVjE4TDI4IDJMNTYgMThWNTBMMjggNjZ6TTI4IDEwMEwwIDg0VjU4TDI4IDQyTDU2IDU4Vjg0TDI4IDEwMHoiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNDQsMTgwLDAsMC4xNSkiIHN0cm9rZS13aWR0aD0iMSIvPjwvc3ZnPg==');
            background-size: cover, 56px 100px;
            color: #fff;
            overflow-x: hidden;
        }

        /* 3. ENTRANCE ANIMATION: POURING HONEY */
        @keyframes pourHoney {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(0); }
        }

        .hero-section {
            position: relative;
            background: var(--honey-yellow);
            height: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: pourHoney 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 10;
            /* 2. REALISTIC IRREGULAR DRIP MASK */
            -webkit-mask-image: 
                radial-gradient(60px at 20% 100%, #000 98%, #0000),
                radial-gradient(45px at 45% 100%, #000 98%, #0000),
                radial-gradient(75px at 75% 100%, #000 98%, #0000),
                linear-gradient(#000 0 0);
            -webkit-mask-size: 33.3% 130px, 33.3% 100px, 33.3% 150px, 100% calc(100% - 60px);
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: 20% bottom, 45% bottom, 75% bottom, top;
            box-shadow: inset 0 -20px 40px rgba(0,0,0,0.2);
        }

        /* Realistic Glossy Highlights on Honey */
        .hero-section::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 40%, rgba(255,255,255,0.2) 90%);
            pointer-events: none;
        }

        /* 4. CSS ANIMATED BEE */
        @keyframes flyAround {
            0% { transform: translate(-10vw, 20vh) rotate(20deg); }
            50% { transform: translate(110vw, 10vh) rotate(-10deg); }
            100% { transform: translate(-10vw, 50vh) rotate(20deg); }
        }

        .bee {
            position: absolute;
            width: 30px;
            height: 20px;
            background: #ffcc00;
            border-radius: 50%;
            z-index: 20;
            box-shadow: inset -4px 0 0 #000, inset 4px 0 0 #000;
            animation: flyAround 12s infinite ease-in-out;
        }

        .bee::before, .bee::after {
            content: ""; position: absolute; width: 12px; height: 12px; 
            background: rgba(255,255,255,0.7); border-radius: 50%; top: -8px;
        }
        .bee::before { left: 4px; } .bee::after { right: 4px; }

        .branding { text-align: center; padding: 40px 0; z-index: 5; position: relative; }
        .branding h1 { 
            font-family: 'Playfair Display', serif; font-size: 75px; 
            color: var(--honey-yellow); line-height: 1; margin-bottom: 10px;
        }
        .branding h2 { letter-spacing: 12px; font-weight: 300; text-transform: uppercase; font-size: 1.1rem; }

        .notice-tag {
            position: absolute; top: 25px; right: 25px; background: #000;
            padding: 10px 15px; font-size: 10px; border-radius: 4px; font-weight: bold;
        }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        .card { 
            background: #fff; border-radius: 20px; padding: 40px; text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); transition: 0.4s ease; color: #333;
        }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; max-width: 170px; margin-bottom: 25px; }
        .price { color: #1f7a4a; font-weight: 800; font-size: 1.5rem; margin: 15px 0; }
        .btn-order { 
            background: var(--whatsapp-green); color: white; text-decoration: none; 
            padding: 12px 30px; border-radius: 50px; font-weight: 600; display: inline-block;
        }
    </style>
</head>
<body>

    <div class="bee"></div>

    <div class="hero-section">
        <div class="notice-tag">NOTICE:<br>DON'T USE WET SPOON.</div>
        <div style="text-align: center;">
            <p style="color: #000; font-weight: 800; letter-spacing: 5px;">PREMIUM RAW HONEY</p>
        </div>
    </div>

    <div class="branding">
        <h1>S&S</h1>
        <h2>Raw Honey</h2>
    </div>

    <div class="container">
        <div class="product-grid">
            <div class="card">
                <img src="assets/Jar1.png" alt="Forest Honey">
                <h3>Organic Forest Honey</h3>
                <div class="price">₹550</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>

            <div class="card">
                <img src="assets/Jar2.png" alt="Mountain Bloom">
                <h3>Mountain Bloom - 500g</h3>
                <div class="price">₹580</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>

            <div class="card">
                <img src="assets/Jar3.png" alt="Wildflower">
                <h3>Wildflower Comb - 300g</h3>
                <div class="price">₹620</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>
        </div>
    </div>

    <div style="text-align: center; padding: 60px 20px;">
        <h2 style="color: var(--honey-yellow); font-size: 2.5rem;">शहद नहीं, हिमाचल का जादू।</h2>
        <p style="font-style: italic; opacity: 0.6; margin-top: 10px;">SHAHAD NAHI, HIMACHAL KA JADOO.</p>
    </div>

</body>
</html>
