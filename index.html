<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&S Raw Honey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --honey:#f4b400;
  --honey-light:#ffd966;
  --green:#0f3d33;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--green);
  color:#fff;
}

/* ================= HEADER / BANNER ================= */
.banner{
  position:relative;
  height:460px;
  background:
    radial-gradient(circle at 20% 10%, #ffe08a 0%, transparent 40%),
    radial-gradient(circle at 80% 15%, #ffd24d 0%, transparent 45%),
    linear-gradient(
      to bottom,
      #ffe08a 0%,
      #f7c531 35%,
      #f4b400 50%,
      #0f3d33 50%,
      #0f3d33 100%
    );
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* Honey shine */
.banner::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:120px;
  background:linear-gradient(
    to bottom,
    rgba(255,255,255,.55),
    rgba(255,255,255,.15),
    transparent
  );
}

/* Honey drip */
.banner::after{
  content:"";
  position:absolute;
  top:50%;
  left:0;
  width:100%;
  height:160px;
  background:
    radial-gradient(circle at 6% 0%, var(--honey) 55%, transparent 56%),
    radial-gradient(circle at 18% 0%, var(--honey-light) 60%, transparent 61%),
    radial-gradient(circle at 32% 0%, var(--honey) 50%, transparent 51%),
    radial-gradient(circle at 48% 0%, var(--honey-light) 62%, transparent 63%),
    radial-gradient(circle at 64% 0%, var(--honey) 55%, transparent 56%),
    radial-gradient(circle at 78% 0%, var(--honey-light) 60%, transparent 61%),
    radial-gradient(circle at 92% 0%, var(--honey) 52%, transparent 53%);
  animation: drip 3.5s ease-in-out infinite;
}

@keyframes drip{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(10px)}
}

/* Notice */
.notice{
  position:absolute;
  top:18px;
  right:18px;
  background:#123b2a;
  padding:10px 14px;
  font-size:12px;
  border-radius:6px;
  z-index:3;
}

/* Banner text */
.banner-content{
  position:relative;
  z-index:2;
}

.banner small{
  letter-spacing:4px;
  color:#000;
}

.banner h1{
  margin:12px 0 4px;
  font-size:52px;
  color:var(--honey);
  text-shadow:
    0 4px 10px rgba(0,0,0,.35),
    0 0 20px rgba(244,180,0,.6);
}

.banner h2{
  font-size:14px;
  letter-spacing:6px;
}

/* Main jar */
.banner-jar{
  position:absolute;
  left:60px;
  bottom:80px;
  width:220px;
  transform:rotate(-8deg);
  filter:drop-shadow(0 20px 25px rgba(0,0,0,.4));
  z-index:2;
}

/* ================= BEES ================= */
.bee{
  position:absolute;
  width:18px;
  height:12px;
  background:#ffcc00;
  border-radius:50%;
  animation: fly 12s linear infinite;
}

.bee::before,
.bee::after{
  content:"";
  position:absolute;
  width:10px;
  height:10px;
  background:rgba(255,255,255,.7);
  border-radius:50%;
  top:-6px;
}

.bee::before{left:-4px}
.bee::after{right:-4px}

@keyframes fly{
  0%{transform:translateX(-10vw) translateY(0)}
  50%{transform:translateX(50vw) translateY(-40px)}
  100%{transform:translateX(110vw) translateY(20px)}
}

/* ================= PRODUCTS ================= */
section{
  padding:70px 20px;
  text-align:center;
}

.products{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:32px;
}

.card{
  background:#fff;
  color:#000;
  border-radius:24px;
  padding:28px;
  box-shadow:0 18px 30px rgba(0,0,0,.35);
}

.card img{
  width:140px;
  margin-bottom:10px;
  filter:drop-shadow(0 10px 15px rgba(0,0,0,.35));
}

.price{
  color:#1f7a4a;
  font-weight:600;
  margin:10px 0 18px;
}

.btn{
  background:#25D366;
  color:#fff;
  text-decoration:none;
  padding:12px 26px;
  border-radius:30px;
  font-size:14px;
}

/* ================= WHATSAPP ================= */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  width:56px;
  height:56px;
  background:#25D366;
  color:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
  box-shadow:0 10px 20px rgba(0,0,0,.3);
  z-index:10;
}

/* ================= FOOTER ================= */
footer{
  background:#0b2e26;
  padding:30px 20px;
  text-align:center;
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .banner{height:420px}
  .banner-jar{width:150px; left:20px}
  .banner h1{font-size:38px}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="banner">

  <div class="notice">NOTICE<br>DON'T USE WET SPOON</div>

  <img src="assets/Jar1.png" class="banner-jar" alt="Honey Jar">

  <div class="banner-content">
    <small>PREMIUM RAW HONEY</small>
    <h1>S&amp;S</h1>
    <h2>RAW HONEY</h2>
  </div>

  <!-- Bees -->
  <div class="bee" style="top:80px;animation-delay:0s"></div>
  <div class="bee" style="top:150px;animation-delay:4s"></div>
  <div class="bee" style="top:220px;animation-delay:7s"></div>

</div>

<!-- PRODUCTS -->
<section>
  <h2>Our Products</h2>

  <div class="products">

    <div class="card">
      <img src="assets/Jar1.png" alt="">
      <h3>Forest Raw Honey</h3>
      <div class="price">₹550</div>
      <a class="btn" href="#">Order on WhatsApp</a>
    </div>

    <div class="card">
      <img src="assets/Jar2.png" alt="">
      <h3>Wildflower Honey</h3>
      <div class="price">₹580</div>
      <a class="btn" href="#">Order on WhatsApp</a>
    </div>

    <div class="card">
      <img src="assets/Jar3.png" alt="">
      <h3>Mountain Honey</h3>
      <div class="price">₹620</div>
      <a class="btn" href="#">Order on WhatsApp</a>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer>
  Pure Raw Honey from Himachal Pradesh<br>
  <small>© S&S Raw Honey</small>
</footer>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/911234567890">💬</a>

</body>
</html>
