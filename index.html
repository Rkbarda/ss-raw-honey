<style>
:root {
    --honey-main: #f4b400;
    --honey-deep: #d49a00;
    --forest: #072a23;
}

body {
    margin: 0;
    background-color: var(--forest);
    font-family: 'Poppins', sans-serif;
    color: white;
    overflow-x: hidden;
    background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1NiIgaGVpZ2h0PSIxMDAiIHZpZXdCb3g9IjAgMCA1NiAxMDAiPjxwYXRoIGQ9Ik0yOCA2NkwwIDUwVjE4TDI4IDJMNTYgMThWNTBMMjggNjZ6TTI4IDEwMEwwIDg0VjU4TDI4IDQyTDU2IDU4Vjg0TDI4IDEwMHoiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNDQsMTgwLDAsMC4wNikiIHN0cm9rZS13aWR0aD0iMSIvPjwvc3ZnPg==');
    background-attachment: fixed;
}

/* HERO WRAPPER – FIX */
.hero {
    position: relative;
    min-height: 520px;
    overflow: visible;
}

/* NOTICE */
.notice {
    position: absolute;
    top: 25px;
    right: 30px;
    background: #000;
    padding: 10px 15px;
    font-size: 10px;
    font-weight: 700;
    border-radius: 4px;
    z-index: 110;
}

/* JAR */
.hero-jar {
    position: absolute;
    left: 8%;
    top: 60px;
    width: 260px;
    z-index: 50;
    transform: rotate(-12deg);
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
}

/* SPOON */
.spoon-container {
    position: absolute;
    top: -20px;
    right: 10%;
    width: 300px;
    z-index: 100;
    animation: spoonDrip 3s ease-in-out infinite alternate;
}

@keyframes spoonDrip {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(15px) rotate(2deg); }
}

/* HONEY BANNER */
.honey-banner {
    position: relative;
    width: 100%;
    height: 480px;
    background: linear-gradient(180deg, var(--honey-main) 0%, var(--honey-deep) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;

    -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="none"><path d="M1200,0H0v265c15,10,15,40,15,70c0,30,15,45,30,45s30-15,30-45c0-30,0-55,15-70s25-15,45-15s35,5,45,15c15,15,15,40,15,70c0,30,15,45,30,45s30-15,30-45c0-30,0-55,15-70s25-15,45-15s35,5,45,15c15,15,15,40,15,70c0,30,15,45,30,45s30-15,30-45c0-30,0-55,15-70s25-15,45-15s35,5,45,15c15,15,15,40,15,70c0,30,15,45,30,45s30-15,30-45c0-30,0-55,15-70V0z"/></svg>');
    -webkit-mask-size: 100% 100%;
    transform-origin: top;
    animation: pour 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
}

@keyframes pour {
    from { transform: scaleY(0); }
    to { transform: scaleY(1); }
}

.branding h1 {
    font-family: 'Playfair Display', serif;
    font-size: 100px;
    color: #000;
    margin: 0;
    line-height: 0.8;
}

.branding h2 {
    letter-spacing: 15px;
    text-transform: uppercase;
    font-size: 1.2rem;
    color: #fff;
    margin-top: 10px;
}

/* PRODUCTS */
.container {
    max-width: 1100px;
    margin: 80px auto;
    padding: 0 20px;
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 40px;
}

.card {
    background: white;
    color: #333;
    border-radius: 30px;
    padding: 40px 20px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 160px;
    margin-bottom: 20px;
}

.price {
    color: #1f7a4a;
    font-size: 1.5rem;
    font-weight: 700;
    margin: 10px 0;
}

.btn-whatsapp {
    background: #25D366;
    color: white;
    text-decoration: none;
    padding: 12px 30px;
    border-radius: 50px;
    display: inline-block;
    font-weight: 600;
}
</style>
</head>
