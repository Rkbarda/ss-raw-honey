<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S Raw Honey | Himachal Ka Jadoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --honey-main: #f4b400;
            --honey-deep: #d49a00;
            --honey-light: #ffdb4d;
            --forest: #072a23;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--forest);
            color: #fff;
            overflow-x: hidden;
        }

        /* 1. ANIMATED HONEYCOMB PATTERN */
        .honeycomb-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1NiIgaGVpZ2h0PSIxMDAiIHZpZXdCb3g9IjAgMCA1NiAxMDAiPjxwYXRoIGQ9Ik0yOCA2NkwwIDUwVjE4TDI4IDJMNTYgMThWNTBMMjggNjZ6TTI4IDEwMEwwIDg0VjU4TDI4IDQyTDU2IDU4Vjg0TDI4IDEwMHoiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNDQsMTgwLDAsMC4wNykiIHN0cm9rZS13aWR0aD0iMSIvPjwvc3ZnPg==');
            background-size: 56px 100px;
            z-index: -1;
            animation: shimmer 10s linear infinite;
        }

        @keyframes shimmer {
            from { background-position: 0 0; }
            to { background-position: 56px 100px; }
        }

        /* 2. GOOEY HONEY BANNER */
        .banner-wrapper {
            position: relative;
            width: 100%;
            height: 450px;
            z-index: 10;
        }

        .honey-drip {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, var(--honey-light) 0%, var(--honey-main) 60%, var(--honey-deep) 100%);
            /* The Organic Liquid Mask */
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="none"><path d="M1200,0H0v260c5,2,10,5,15,10c15,15,15,40,15,70c0,30,15,45,30,45s30-15,30-45c0-30,0-55,15-70s25-15,45-15s35,5,45,15c15,15,15,40,15,70c0,30,15,45,30,45s30-15,30-45c0-30,0-55,15-70s25-15,45-15s35,5,45,15c15,15,15,40,15,70c0,30,15,45,30,45s30-15,30-45c0-30,0-55,15-70s25-15,45-15s35,5,45,15c15,15,15,40,15,70c0,30,15,45,30,45s30-15,30-45c0-30,0-55,15-70V0z"/></svg>');
            -webkit-mask-size: 100% 100%;
            animation: pour 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            transform-origin: top;
            box-shadow: inset 0 -10px 30px rgba(0,0,0,0.1);
        }

        @keyframes pour {
            from { transform: scaleY(0); }
            to { transform: scaleY(1); }
        }

        /* 3. BRANDING & ASSETS */
        .hero-content {
            position: relative;
            z-index: 20;
            text-align: center;
            padding-top: 80px;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 90px;
            color: #000;
            line-height: 0.8;
            margin-bottom: 5px;
        }

        .hero-content h2 {
            letter-spacing: 12px;
            text-transform: uppercase;
            font-size: 1.1rem;
            color: #fff;
        }

        .hero-jar {
            position: absolute;
            left: 5%;
            top: 50px;
            width: 250px;
            z-index: 50;
            transform: rotate(-12deg);
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
        }

        /* 4. ANIMATED SPOON SVG */
        .spoon-drip {
            position: absolute;
            right: 8%;
            top: -10px;
            width: 280px;
            z-index: 60;
            animation: spoonMove 4s ease-in-out infinite alternate;
        }

        @keyframes spoonMove {
            from { transform: translateY(0); }
            to { transform: translateY(15px); }
        }

        /* 5. PRODUCT CARDS */
        .container { max-width: 1100px; margin: 80px auto; padding: 0 20px; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .card {
            background: #fff;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            color: #333;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-10px); }
        .card img { width: 160px; margin-bottom: 20px; }
        .price { color: #1f7a4a; font-weight: 800; font-size: 1.5rem; margin: 10px 0; }
        .btn-whatsapp {
            background: var(--whatsapp);
            color: #fff;
            text-decoration: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 600;
            display: inline-block;
        }

        .notice-box {
            position: absolute; top: 25px; right: 25px;
            background: #000; color: #fff; padding: 8px 12px;
            font-size: 10px; font-weight: 700; border-radius: 4px; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="honeycomb-bg"></div>

    <div class="banner-wrapper">
        <div class="notice-box">NOTICE:<br>DON'T USE WET SPOON</div>

        <img src="assets/Jar1.png" class="hero-jar" alt="S&S Jar">

        <div class="spoon-drip">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <rect x="140" y="10" width="8" height="120" rx="4" fill="#6d4c41" transform="rotate(-40 140 10)"/>
                <ellipse cx="70" cy="110" rx="35" ry="25" fill="#8d6e63" transform="rotate(-10 70 110)"/>
                <path d="M40,105 Q70,70 105,105 Q110,145 70,155 Q30,145 40,105" fill="#f4b400">
                    <animate attributeName="fill" values="#f4b400;#ffdb4d;#f4b400" dur="3s" repeatCount="indefinite" />
                </path>
                <path d="M65,150 Q70,180 75,150" fill="#f4b400">
                    <animate attributeName="d" values="M65,150 Q70,180 75,150; M65,150 Q70,240 75,150; M65,150 Q70,180 75,150" dur="2.5s" repeatCount="indefinite" />
                </path>
            </svg>
        </div>

        <div class="honey-drip">
            <div class="hero-content">
                <p style="color: #000; font-weight: 800; letter-spacing: 4px; margin-bottom: 10px;">PREMIUM QUALITY</p>
                <h1>S&S</h1>
                <h2>Raw Honey</h2>
            </div>
        </div>
    </div>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 60px; letter-spacing: 2px;">OUR PRODUCTS</h2>
        <div class="product-grid">
            <div class="card">
                <img src="assets/Jar1.png" alt="Jar 1">
                <h3>Organic Forest Honey</h3>
                <div class="price">₹550</div>
                <a href="https://wa.me/911234567890" class="btn-whatsapp">Order on WhatsApp</a>
            </div>
            <div class="card">
                <img src="assets/Jar2.png" alt="Jar 2">
                <h3>Mountain Bloom</h3>
                <div class="price">₹580</div>
                <a href="https://wa.me/911234567890" class="btn-whatsapp">Order on WhatsApp</a>
            </div>
            <div class="card">
                <img src="assets/Jar3.png" alt="Jar 3">
                <h3>Wildflower Comb</h3>
                <div class="price">₹620</div>
                <a href="https://wa.me/911234567890" class="btn-whatsapp">Order on WhatsApp</a>
            </div>
        </div>
    </div>

    <div style="text-align: center; padding: 40px 20px;">
        <h2 style="color: var(--honey-main); font-size: 2.2rem;">शहद नहीं, हिमाचल का जादू।</h2>
        <p style="opacity: 0.6; font-style: italic; margin-top: 10px;">PURE HONEY, FROM HIVE TO HOME</p>
    </div>

</body>
</html>
