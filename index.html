<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&S Raw Honey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --yellow:#f4b400;
  --dark:#0f3d33;
  --green:#1f7a4a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--dark);
  color:#fff;
}

/* ================= BANNER ================= */
.banner{
  position:relative;
  height:440px;
  background:linear-gradient(
    to bottom,
    #f7c531 0%,
    #f4b400 55%,
    #0f3d33 55%,
    #0f3d33 100%
  );
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* Animated honey drip */
.banner::after{
  content:"";
  position:absolute;
  top:55%;
  left:0;
  width:100%;
  height:140px;
  animation: drip 3s ease-in-out infinite;
  background:
    radial-gradient(circle at 8% 0%, var(--yellow) 45%, transparent 46%),
    radial-gradient(circle at 25% 0%, var(--yellow) 50%, transparent 51%),
    radial-gradient(circle at 42% 0%, var(--yellow) 40%, transparent 41%),
    radial-gradient(circle at 60% 0%, var(--yellow) 48%, transparent 49%),
    radial-gradient(circle at 78% 0%, var(--yellow) 42%, transparent 43%),
    radial-gradient(circle at 92% 0%, var(--yellow) 38%, transparent 39%);
}

@keyframes drip{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(8px); }
}

/* Notice */
.notice{
  position:absolute;
  top:18px;
  right:18px;
  background:#123b2a;
  padding:10px 14px;
  font-size:12px;
  border-radius:6px;
  z-index:3;
}

/* Banner content */
.banner-content{
  position:relative;
  z-index:2;
}

.banner small{
  letter-spacing:4px;
  color:#000;
}

.banner h1{
  margin:14px 0 6px;
  font-size:48px;
  color:var(--yellow);
}

.banner h2{
  font-size:14px;
  letter-spacing:5px;
}

/* Jar */
.banner-jar{
  position:absolute;
  left:60px;
  bottom:80px;
  width:220px;
  transform:rotate(-10deg);
  z-index:2;
}

/* ================= BEES ================= */
.bee{
  position:absolute;
  width:18px;
  height:12px;
  background:#ffcc00;
  border-radius:50%;
  animation: fly 10s linear infinite;
}

.bee::before,
.bee::after{
  content:"";
  position:absolute;
  width:10px;
  height:10px;
  background:rgba(255,255,255,.7);
  border-radius:50%;
  top:-6px;
}

.bee::before{ left:-4px; }
.bee::after{ right:-4px; }

@keyframes fly{
  0%{ transform:translateX(-10vw) translateY(0); }
  50%{ transform:translateX(50vw) translateY(-30px); }
  100%{ transform:translateX(110vw) translateY(10px); }
}

/* ================= PRODUCTS ================= */
section{
  padding:60px 20px;
  text-align:center;
}

.products{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:28px;
}

.card{
  background:#fff;
  color:#000;
  border-radius:20px;
  padding:28px;
  box-shadow:0 15px 30px rgba(0,0,0,.3);
}

.price{
  color:var(--green);
  font-weight:600;
  margin:12px 0 18px;
}

.btn{
  background:#25D366;
  color:#fff;
  text-decoration:none;
  padding:12px 26px;
  border-radius:30px;
  font-size:14px;
}

/* ================= WHATSAPP FLOAT ================= */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  width:56px;
  height:56px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
  box-shadow:0 10px 20px rgba(0,0,0,.3);
  z-index:10;
}

/* ================= FOOTER ================= */
footer{
  background:#0b2e26;
  padding:30px 20px;
  text-align:center;
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .banner{
    height:400px;
  }

  .banner-jar{
    width:150px;
    left:20px;
    bottom:100px;
  }

  .banner h1{
    font-size:36px;
  }

  section{
    padding:40px 16px;
  }
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">

  <div class="notice">NOTICE:<br>DON'T USE WET SPOON</div>

  <img src="assets/jar1.png" class="banner-jar" alt="Raw Honey">

  <div class="banner-content">
    <small>PREMIUM RAW HONEY</small>
    <h1>S&amp;S</h1>
    <h2>RAW HONEY</h2>
  </div>

  <!-- Bees -->
  <div class="bee" style="top:80px; animation-delay:0s;"></div>
  <div class="bee" style="top:140px; animation-delay:4s;"></div>
  <div class="bee" style="top:200px; animation-delay:7s;"></div>

</div>

<!-- PRODUCTS -->
<section>
  <h2>Our Products</h2>

  <div class="products">
    <div class="card">
      <h3>Forest Raw Honey</h3>
      <div class="price">₹550</div>
      <a class="btn" href="#">Order Now</a>
    </div>

    <div class="card">
      <h3>Wildflower Honey</h3>
      <div class="price">₹580</div>
      <a class="btn" href="#">Order Now</a>
    </div>

    <div class="card">
      <h3>Mountain Honey</h3>
      <div class="price">₹620</div>
      <a class="btn" href="#">Order Now</a>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  Pure Honey from Himachal Pradesh<br>
  <small>© S&S Raw Honey</small>
</footer>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/911234567890">💬</a>

</body>
</html>
