<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S Raw Honey | Premium Liquid Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --honey: #f4b400;
            --honey-deep: #d49a00;
            --forest: #072a23;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--forest);
            color: #fff;
            overflow-x: hidden;
            /* Full Screen Honeycomb Pattern */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1NiIgaGVpZ2h0PSIxMDAiIHZpZXdCb3g9IjAgMCA1NiAxMDAiPjxwYXRoIGQ9Ik0yOCA2NkwwIDUwVjE4TDI4IDJMNTYgMThWNTBMMjggNjZ6TTI4IDEwMEwwIDg0VjU4TDI4IDQyTDU2IDU4Vjg0TDI4IDEwMHoiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNDQsMTgwLDAsMC4wNikiIHN0cm9rZS13aWR0aD0iMSIvPjwvc3ZnPg==');
            background-size: 56px 100px;
            background-attachment: fixed;
        }

        /* FIXED: Full Width Header */
        header {
            position: relative;
            width: 100%;
            height: 500px;
            background: linear-gradient(180deg, #ffdc5e 0%, var(--honey) 70%, var(--honey-deep) 100%);
            z-index: 10;
            /* Improved Full-Width Mask */
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="none"><path d="M1200,0H0v280c20,15,20,50,20,80c0,30,15,45,30,45s30-15,30-45c0-30,0-65,20-80s30-15,50-15s40,5,50,15c20,15,20,50,20,80c0,30,15,45,30,45s30-15,30-45c0-30,0-65,20-80s30-15,50-15s40,5,50,15c20,15,20,50,20,80c0,30,15,45,30,45s30-15,30-45c0-30,0-65,20-80s30-15,50-15s40,5,50,15c20,15,20,50,20,80c0,30,15,45,30,45s30-15,30-45c0-30,0-65,20-80s30-15,50-15s40,5,50,15c20,15,20,50,20,80c0,30,15,45,30,45s30-15,30-45c0-30,0-65,20-80V0z"/></svg>');
            -webkit-mask-size: 100% 100%;
            mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="none"><path d="M1200,0H0v280c20,15,20,50,20,80c0,30,15,45,30,45s30-15,30-45c0-30,0-65,20-80s30-15,50-15s40,5,50,15c20,15,20,50,20,80c0,30,15,45,30,45s30-15,30-45c0-30,0-65,20-80s30-15,50-15s40,5,50,15c20,15,20,50,20,80c0,30,15,45,30,45s30-15,30-45c0-30,0-65,20-80s30-15,50-15s40,5,50,15c20,15,20,50,20,80c0,30,15,45,30,45s30-15,30-45c0-30,0-65,20-80s30-15,50-15s40,5,50,15c20,15,20,50,20,80c0,30,15,45,30,45s30-15,30-45c0-30,0-65,20-80V0z"/></svg>');
            mask-size: 100% 100%;
        }

        /* ADDED: Honey Spoon Art */
        .spoon-art {
            position: absolute;
            top: -20px;
            right: 10%;
            width: 350px;
            z-index: 100;
            pointer-events: none;
        }

        /* ADDED: Honey Jar Positioning */
        .honey-jar {
            position: absolute;
            left: 5%;
            top: 50px;
            width: 280px;
            z-index: 50;
            transform: rotate(-12deg);
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
        }

        .branding {
            text-align: center;
            padding-top: 100px;
            position: relative;
            z-index: 20;
        }

        .branding h1 { font-family: 'Playfair Display', serif; font-size: 100px; color: #000; line-height: 1; }
        .branding h2 { letter-spacing: 12px; text-transform: uppercase; font-size: 1.2rem; color: #fff; margin-top: 5px;}

        /* PRODUCT GRID */
        .container { max-width: 1200px; margin: 100px auto; padding: 0 20px; text-align: center;}
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; margin-top: 50px;}

        .card {
            background: #fff; border-radius: 40px; padding: 40px 20px; color: #333;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 170px; margin-bottom: 20px; }
        .price { color: #1f7a4a; font-weight: 800; font-size: 1.7rem; margin: 15px 0; }
        
        .btn-order {
            background: var(--whatsapp); color: #fff; text-decoration: none; padding: 14px 35px;
            border-radius: 50px; font-weight: 700; display: inline-block;
        }

        .notice {
            position: absolute; top: 40px; right: 40px;
            background: #000; padding: 10px 15px; font-size: 11px; font-weight: 700;
            border-radius: 4px; z-index: 110;
        }
    </style>
</head>
<body>

    <header>
        <div class="notice">NOTICE:<br>DON'T USE WET SPOON</div>

        <img src="assets/Jar1.png" class="honey-jar" alt="Jar">

        <div class="spoon-art">
            <svg viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg">
                <rect x="150" y="0" width="10" height="140" rx="5" fill="#8d6e63" transform="rotate(-40 150 0)"/>
                <ellipse cx="80" cy="120" rx="40" ry="30" fill="#a1887f" transform="rotate(-10 80 120)"/>
                <path d="M50,115 Q80,80 115,115 Q120,160 80,170 Q40,160 50,115" fill="#f4b400" />
                <path d="M75,165 Q80,210 85,165" fill="#f4b400">
                    <animate attributeName="d" 
                        values="M75,165 Q80,210 85,165; M75,165 Q80,280 85,165; M75,165 Q80,210 85,165" 
                        dur="3s" repeatCount="indefinite" />
                </path>
                <path d="M60,110 Q80,100 100,110" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
            </svg>
        </div>

        <div class="branding">
            <p style="color: #000; font-weight: 800; letter-spacing: 5px;">HIMACHAL KA JADOO</p>
            <h1>S&S</h1>
            <h2>Raw Honey</h2>
        </div>
    </header>

    <div class="container">
        <h2 style="letter-spacing: 2px; text-transform: uppercase;">Our Products</h2>
        <div class="product-grid">
            <div class="card">
                <img src="assets/Jar1.png" alt="Forest Honey">
                <h3>Organic Forest Honey</h3>
                <div class="price">₹550</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>
            <div class="card">
                <img src="assets/Jar2.png" alt="Mountain Bloom">
                <h3>Mountain Bloom - 500g</h3>
                <div class="price">₹580</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>
            <div class="card">
                <img src="assets/Jar3.png" alt="Wildflower Comb">
                <h3>Wildflower Comb - 300g</h3>
                <div class="price">₹620</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>
        </div>
    </div>

    <div style="text-align: center; padding: 50px 20px;">
        <h2 style="color: var(--honey); font-size: 2.5rem;">शहद नहीं, हिमाचल का जादू।</h2>
    </div>

</body>
</html>
