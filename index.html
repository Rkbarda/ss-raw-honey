<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&S Raw Honey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --yellow:#f4b400;
  --dark:#072a23; /* Darkened to match original */
  --green:#1f7a4a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--dark);
  color:#fff;
  /* 1. Honeycomb Pattern added back to background */
  background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0NiIgdmlld0JveD0iMCAwIDQwIDQ2Ij48cGF0aCBkPSJNMjAgMEw0MCAxMS41VjM0LjVMMjAgNDZMMCAzNC41VjExLjVMMjAgMFoiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNDQsMTgwLDAsMC4wNSKSIgc3Ryb2tlLXdpZHRoPSIxIi8+PC9zdmc+');
  background-size: 60px;
}

/* ================= BANNER ================= */
.banner-container {
  position: relative;
  width: 100%;
  height: 480px; 
  z-index: 10;
}

.banner{
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  background: var(--yellow);
  /* 3. Pouring Animation */
  animation: pourHoney 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  
  /* 2. Realistic Irregular Drip using CSS Mask */
  -webkit-mask-image: 
    radial-gradient(60px at 15% 100%, #000 98%, #0000),
    radial-gradient(45px at 45% 100%, #000 98%, #0000),
    radial-gradient(75px at 80% 100%, #000 98%, #0000),
    linear-gradient(#000 0 0);
  -webkit-mask-size: 34% 140px, 34% 100px, 34% 160px, 100% calc(100% - 60px);
  -webkit-mask-repeat: no-repeat;
  -webkit-mask-position: 15% bottom, 45% bottom, 80% bottom, top;
}

@keyframes pourHoney {
  0% { height: 0; }
  100% { height: 420px; }
}

.notice{
  position:absolute;
  top:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px 14px;
  font-size:10px;
  font-weight: bold;
  border-radius:4px;
  z-index:15;
}

.banner-content{
  position:relative;
  z-index:10;
  margin-top: -40px;
}

.banner-content h1{
  font-size: 80px;
  color: #000;
  margin: 0;
}

/* 4. Placing Jar ABOVE the banner drip */
.banner-jar{
  position:absolute;
  left:10%;
  top: 60px;
  width:220px;
  transform:rotate(-10deg);
  z-index:20; /* Higher than banner */
  filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4));
}

/* ================= PRODUCTS ================= */
.section-title {
    margin: 100px auto 40px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.products{
  max-width:1100px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
  padding-bottom: 60px;
}

.card{
  background:#fff;
  color:#000;
  border-radius:25px;
  padding:30px;
  box-shadow:0 20px 40px rgba(0,0,0,.5);
  transition: transform 0.3s ease;
}

.card:hover { transform: translateY(-10px); }

.card img {
    width: 150px;
    margin-bottom: 15px;
}

.btn{
  display:inline-block;
  background:#25D366;
  color:#fff;
  text-decoration:none;
  padding:12px 30px;
  border-radius:30px;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="banner-container">
  <div class="notice">
    NOTICE:<br>DON'T USE WET SPOON
  </div>

  <img src="assets/Jar1.png" class="banner-jar" alt="Jar">

  <div class="banner">
    <div class="banner-content">
      <small style="color: #000; font-weight: 700; letter-spacing: 4px;">PREMIUM QUALITY</small>
      <h1 style="font-family: 'Playfair Display', serif;">S&S</h1>
      <h2 style="color: #fff; letter-spacing: 8px;">RAW HONEY</h2>
    </div>
  </div>
</div>

<section>
  <h2 class="section-title">About Us</h2>
  <div class="products">
    <div class="card">
      <img src="assets/Jar1.png" alt="Jar1">
      <h3>Organic Forest Honey</h3>
      <div class="price">₹550</div>
      <a class="btn" href="#">Order on WhatsApp</a>
    </div>
    <div class="card">
      <img src="assets/Jar2.png" alt="Jar2">
      <h3>Mountain Bloom</h3>
      <div class="price">₹580</div>
      <a class="btn" href="#">Order on WhatsApp</a>
    </div>
    <div class="card">
      <img src="assets/Jar3.png" alt="Jar3">
      <h3>Wildflower Comb</h3>
      <div class="price">₹620</div>
      <a class="btn" href="#">Order on WhatsApp</a>
    </div>
  </div>
</section>

</body>
</html>
