<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S Raw Honey | Himachal Ka Jadoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --honey: #f4b400;
            --dark-forest: #072a23;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-forest);
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* 1. ANIMATED HONEYCOMB PATTERN */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 200%; height: 200%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1NiIgaGVpZ2h0PSIxMDAiIHZpZXdCb3g9IjAgMCA1NiAxMDAiPjxwYXRoIGQ9Ik0yOCA2NkwwIDUwVjE4TDI4IDJMNTYgMThWNTBMMjggNjZ6TTI4IDEwMEwwIDg0VjU4TDI4IDQyTDU2IDU4Vjg0TDI4IDEwMHoiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNDQsMTgwLDAsMC4wOCkiIHN0cm9rZS13aWR0aD0iMSIvPjwvc3ZnPg==');
            background-size: 56px 100px;
            z-index: -1;
            animation: movePattern 60s linear infinite;
        }

        @keyframes movePattern {
            from { transform: translate(0, 0); }
            to { transform: translate(-56px, -100px); }
        }

        /* 2. GOOEY DRIP BANNER */
        .banner-container {
            position: relative;
            width: 100%;
            height: 480px;
            z-index: 10;
        }

        .honey-drip {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--honey);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Pouring Animation on load */
            animation: dripDown 1.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;

            mask-size: 100% 100%;

        @keyframes dripDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        /* Shine effect on the honey */
        .honey-drip::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 40%, rgba(255,255,255,0.1) 90%);
            pointer-events: none;
        }

        /* 3. HERO CONTENT & JAR */
        .hero-content {
            position: relative;
            z-index: 20;
            text-align: center;
            margin-top: 50px;
        }

        .hero-content h1 { font-size: 90px; color: #000; line-height: 0.9; }
        .hero-content h2 { letter-spacing: 12px; font-weight: 300; text-transform: uppercase; color: #fff; }

        .banner-jar {
            position: absolute;
            left: 10%;
            top: 50px;
            width: 250px;
            transform: rotate(-12deg);
            z-index: 30;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
            animation: jarEnter 2s ease-out;
        }

        @keyframes jarEnter {
            0% { opacity: 0; transform: scale(0.5) rotate(0); }
            100% { opacity: 1; transform: scale(1) rotate(-12deg); }
        }

        .notice-tag {
            position: absolute; top: 25px; right: 25px;
            background: #000; color: #fff; padding: 10px 15px;
            font-size: 11px; font-weight: 700; border-radius: 4px; z-index: 40;
        }

        /* 4. PRODUCT GRID */
        .container { max-width: 1200px; margin: 80px auto; padding: 0 20px; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .card {
            background: #fff;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: 0.3s;
            color: #333;
        }

        .card:hover { transform: translateY(-15px); }
        .card img { width: 170px; margin-bottom: 25px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); }
        .price { color: #1f7a4a; font-weight: 800; font-size: 1.6rem; margin: 15px 0; }

        .btn-order {
            background: var(--whatsapp);
            color: #fff;
            text-decoration: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 600;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <div class="notice-tag">NOTICE:<br>DON'T USE WET SPOON</div>
        
        <img src="assets/Jar1.png" class="banner-jar" alt="S&S Honey">

        <div class="honey-drip">
            <div class="hero-content">
                <p style="color: #000; font-weight: 800; letter-spacing: 5px; margin-bottom: 10px;">PREMIUM RAW HONEY</p>
                <h1 style="font-family: serif;">S&S</h1>
                <h2>Raw Honey</h2>
            </div>
        </div>
    </div>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 60px; letter-spacing: 2px;">ABOUT US</h2>
        
        <div class="product-grid">
            <div class="card">
                <img src="assets/Jar1.png" alt="Forest Honey">
                <h3>Organic Forest Honey</h3>
                <div class="price">₹550</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>

            <div class="card">
                <img src="assets/Jar2.png" alt="Mountain Bloom">
                <h3>Mountain Bloom - 500g</h3>
                <div class="price">₹580</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>

            <div class="card">
                <img src="assets/Jar3.png" alt="Wildflower Comb">
                <h3>Wildflower Comb - 300g</h3>
                <div class="price">₹620</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>
        </div>
    </div>

    <div style="text-align: center; padding: 60px 20px;">
        <h2 style="color: var(--honey); font-size: 2.5rem; margin-bottom: 10px;">शहद नहीं, हिमाचल का जादू।</h2>
        <p style="font-style: italic; opacity: 0.6;">SHAHAD NAHI, HIMACHAL KA JADOO.</p>
    </div>

</body>
</html>
