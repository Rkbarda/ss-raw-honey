<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&S Raw Honey</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --honey:#f4b400;
  --honey-dark:#d49a00;
  --forest:#072a23;
}

/* GLOBAL */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background-color:var(--forest);
  color:#fff;
  overflow-x:hidden;
}

/* HONEYCOMB PATTERN */
.pattern{
  background-image:url('data:image/svg+xml;utf8,\
<svg xmlns="http://www.w3.org/2000/svg" width="56" height="32">\
<path d="M28 0L56 16L28 32L0 16Z" fill="none" stroke="rgba(244,180,0,.08)"/>\
</svg>');
}

/* HERO */
.hero{
  position:relative;
  height:520px;
  overflow:hidden;
}

.notice{
  position:absolute;
  top:25px;
  right:30px;
  background:#000;
  padding:10px 15px;
  font-size:10px;
  font-weight:700;
  border-radius:4px;
  z-index:20;
}

.hero-jar{
  position:absolute;
  left:7%;
  top:60px;
  width:260px;
  transform:rotate(-12deg);
  z-index:10;
  filter:drop-shadow(0 20px 40px rgba(0,0,0,.5));
}

.spoon{
  position:absolute;
  top:0;
  right:8%;
  width:300px;
  z-index:15;
}

/* HONEY HEADER */
.honey-header{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,var(--honey),var(--honey-dark));
  -webkit-mask-image:url('data:image/svg+xml;utf8,\
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" preserveAspectRatio="none">\
<path d="M0,0H1200V215 \
C1120,215 1100,245 1060,245 \
C1020,245 1000,215 940,215 \
C880,215 860,245 820,245 \
C780,245 760,215 700,215 \
C640,215 620,245 580,245 \
C540,245 520,215 460,215 \
C400,215 380,245 340,245 \
C300,245 280,215 220,215 \
C160,215 140,245 100,245 \
C60,245 40,215 0,215Z"/>\
</svg>');
  -webkit-mask-size:100% 100%;
}

.honey-header::after{
  content:'';
  position:absolute;
  bottom:-2px;
  width:100%;
  height:55px;
  background:radial-gradient(ellipse at center top,
    rgba(0,0,0,.25),
    rgba(0,0,0,0) 70%);
}

/* BRAND */
.brand{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:5;
}

.brand p{
  color:#000;
  letter-spacing:5px;
  font-weight:700;
}

.brand h1{
  font-family:'Playfair Display',serif;
  font-size:100px;
  margin:0;
  color:#000;
}

.brand h2{
  letter-spacing:12px;
  font-size:1.1rem;
}

/* PRODUCTS */
.products{
  padding:100px 20px;
}

.grid{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:40px;
}

.card{
  background:#fff;
  color:#333;
  border-radius:30px;
  padding:40px 20px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,.4);
  transition:.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:160px;
  margin-bottom:20px;
}

.price{
  font-size:1.5rem;
  color:#1f7a4a;
  font-weight:700;
}

.whatsapp{
  display:inline-block;
  margin-top:15px;
  padding:12px 30px;
  background:#25D366;
  color:#fff;
  border-radius:50px;
  text-decoration:none;
  font-weight:600;
}

/* FOOTER */
footer{
  padding:60px 20px;
  text-align:center;
  font-size:14px;
  opacity:.8;
}

/* MOBILE */
@media(max-width:768px){
  .hero{height:620px;}
  .hero-jar{width:180px;top:90px;}
  .spoon{width:200px;}
  .brand h1{font-size:64px;}
}
</style>
</head>

<body class="pattern">

<!-- HERO -->
<section class="hero">

  <div class="notice">NOTICE:<br>DON'T USE WET SPOON</div>

  <img src="assets/Jar1.png" class="hero-jar" alt="Honey Jar">

  <img src="assets/spoon.svg" class="spoon" alt="Spoon">

  <div class="honey-header"></div>

  <div class="brand">
    <div>
      <p>PREMIUM RAW HONEY</p>
      <h1>S&S</h1>
      <h2>RAW HONEY</h2>
    </div>
  </div>

</section>

<!-- PRODUCTS -->
<section class="products pattern">
  <div class="grid">

    <div class="card">
      <img src="assets/Jar1.png">
      <h3>Organic Forest Honey</h3>
      <div class="price">₹550</div>
      <a class="whatsapp"
        href="https://wa.me/91XXXXXXXXXX?text=Organic%20Forest%20Honey"
        target="_blank">Order on WhatsApp</a>
    </div>

    <div class="card">
      <img src="assets/Jar2.png">
      <h3>Mountain Bloom</h3>
      <div class="price">₹580</div>
      <a class="whatsapp"
        href="https://wa.me/91XXXXXXXXXX?text=Mountain%20Bloom%20Honey"
        target="_blank">Order on WhatsApp</a>
    </div>

    <div class="card">
      <img src="assets/Jar3.png">
      <h3>Wildflower Comb</h3>
      <div class="price">₹620</div>
      <a class="whatsapp"
        href="https://wa.me/91XXXXXXXXXX?text=Wildflower%20Comb%20Honey"
        target="_blank">Order on WhatsApp</a>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="pattern">
  © 2025 S&S Raw Honey · Pure · Natural · Unfiltered
</footer>

</body>
</html>
