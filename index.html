<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S Raw Honey | Liquid Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --honey-main: #f4b400;
            --honey-deep: #d49a00;
            --forest: #072a23;
        }

        body {
            margin: 0;
            background-color: var(--forest);
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow-x: hidden;
            /* Animated Honeycomb Background */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1NiIgaGVpZ2h0PSIxMDAiIHZpZXdCb3g9IjAgMCA1NiAxMDAiPjxwYXRoIGQ9Ik0yOCA2NkwwIDUwVjE4TDI4IDJMNTYgMThWNTBMMjggNjZ6TTI4IDEwMEwwIDg0VjU4TDI4IDQyTDU2IDU4Vjg0TDI4IDEwMHoiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNDQsMTgwLDAsMC4wNikiIHN0cm9rZS13aWR0aD0iMSIvPjwvc3ZnPg==');
            background-attachment: fixed;
        }

        /* 1. THE HONEY SPOON (SVG CODE) */
        .spoon-container {
            position: absolute;
            top: -20px;
            right: 10%;
            width: 300px;
            z-index: 100;
            animation: spoonDrip 3s ease-in-out infinite alternate;
        }

        @keyframes spoonDrip {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(15px) rotate(2deg); }
        }

        /* 2. THE LIQUID BANNER */
        .honey-banner {
            position: relative;
            width: 100%;
            height: 420px;
            background: linear-gradient(180deg, var(--honey-main) 0%, var(--honey-deep) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            /* Organic Liquid Drip Mask */
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="none"><path d="M1200,0H0v265c15,10,15,40,15,70c0,30,15,45,30,45s30-15,30-45c0-30,0-55,15-70s25-15,45-15s35,5,45,15c15,15,15,40,15,70c0,30,15,45,30,45s30-15,30-45c0-30,0-55,15-70s25-15,45-15s35,5,45,15c15,15,15,40,15,70c0,30,15,45,30,45s30-15,30-45c0-30,0-55,15-70s25-15,45-15s35,5,45,15c15,15,15,40,15,70c0,30,15,45,30,45s30-15,30-45c0-30,0-55,15-70V0z"/></svg>');
            -webkit-mask-size: 100% 100%;
            animation: pour 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            transform-origin: top;
        }

        @keyframes pour {
            from { transform: scaleY(0); }
            to { transform: scaleY(1); }
        }

        .branding h1 {
            font-family: 'Playfair Display', serif;
            font-size: 100px;
            color: #000;
            margin: 0;
            line-height: 0.8;
        }

        .branding h2 {
            letter-spacing: 15px;
            text-transform: uppercase;
            font-size: 1.2rem;
            color: #fff;
            margin-top: 10px;
        }

        /* 3. JAR PLACEMENT (YOUR ASSET) */
        .hero-jar {
            position: absolute;
            left: 8%;
            top: 60px;
            width: 260px;
            z-index: 50;
            transform: rotate(-12deg);
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
        }

        /* 4. NOTICE BOX */
        .notice {
            position: absolute;
            top: 25px;
            right: 30px;
            background: #000;
            padding: 10px 15px;
            font-size: 10px;
            font-weight: 700;
            border-radius: 4px;
            z-index: 110;
        }

        /* PRODUCT CARDS */
        .container { max-width: 1100px; margin: 80px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { 
            background: white; color: #333; border-radius: 30px; padding: 40px 20px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: 0.3s;
        }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 160px; margin-bottom: 20px; }
        .price { color: #1f7a4a; font-size: 1.5rem; font-weight: 700; margin: 10px 0; }
        .btn-whatsapp { 
            background: #25D366; color: white; text-decoration: none; padding: 12px 30px; 
            border-radius: 50px; display: inline-block; font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="notice">NOTICE:<br>DON'T USE WET SPOON</div>

    <img src="assets/Jar1.png" class="hero-jar" alt="Jar">

    <div class="spoon-container">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <rect x="150" y="20" width="10" height="100" rx="5" fill="#8d6e63" transform="rotate(-45 150 20)"/>
            <ellipse cx="80" cy="110" rx="35" ry="25" fill="#bcaaa4" transform="rotate(-15 80 110)"/>
            <path d="M50,105 Q80,75 115,105 Q120,140 80,150 Q40,140 50,105" fill="#f4b400" />
            <path d="M75,145 Q80,185 85,145" fill="#f4b400">
                <animate attributeName="d" dur="2s" repeatCount="indefinite" 
                    values="M75,145 Q80,165 85,145; M75,145 Q80,200 85,145; M75,145 Q80,165 85,145" />
            </path>
            <path d="M65,100 Q80,90 95,100" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
        </svg>
    </div>

    <div class="honey-banner">
        <div class="branding">
            <p style="color: #000; font-weight: 800; letter-spacing: 5px; margin-bottom: 10px;">PREMIUM RAW HONEY</p>
            <h1>S&S</h1>
            <h2>Raw Honey</h2>
        </div>
    </div>

    <div class="container">
        <div class="product-grid">
            <div class="card">
                <img src="assets/Jar1.png" alt="Jar 1">
                <h3>Organic Forest Honey</h3>
                <div class="price">₹550</div>
                <a href="#" class="btn-whatsapp">Order on WhatsApp</a>
            </div>
            <div class="card">
                <img src="assets/Jar2.png" alt="Jar 2">
                <h3>Mountain Bloom</h3>
                <div class="price">₹580</div>
                <a href="#" class="btn-whatsapp">Order on WhatsApp</a>
            </div>
            <div class="card">
                <img src="assets/Jar3.png" alt="Jar 3">
                <h3>Wildflower Comb</h3>
                <div class="price">₹620</div>
                <a href="#" class="btn-whatsapp">Order on WhatsApp</a>
            </div>
        </div>
    </div>

</body>
</html>
