<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S Raw Honey | Himachal Ka Jadoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --honey-yellow: #f4b400;
            --dark-forest: #072a23;
            --whatsapp-green: #25D366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-forest);
            /* 1. Honeycomb Pattern Background */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0NiIgdmlld0JveD0iMCAwIDQwIDQ2Ij48cGF0aCBkPSJNMjAgMEw0MCAxMS41VjM0LjVMMjAgNDZMMCAzNC41VjExLjVMMjAgMFoiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNDQsMTgwLDAsMC4wNSKSIgc3Ryb2tlLXdpZHRoPSIxIi8+PC9zdmc+');
            background-size: 60px;
            color: #fff;
            overflow-x: hidden;
        }

        /* 3. Honey Loading Animation */
        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        .hero-bg {
            background: var(--honey-yellow) url('assets/Hero.png') center/cover no-repeat;
            height: 350px;
            position: relative;
            animation: slideDown 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 5;
            /* 2. Realistic Mask Drip */
            mask-image: radial-gradient(50px at 50% 100%, #000 98%, #0000), linear-gradient(#000 0 0);
            mask-size: 100px 100%, 100% calc(100% - 50px);
            mask-repeat: repeat-x, no-repeat;
            mask-position: bottom;
            -webkit-mask-image: radial-gradient(50px at 50% 100%, #000 98%, #0000), linear-gradient(#000 0 0);
            -webkit-mask-size: 100px 100%, 100% calc(100% - 50px);
            -webkit-mask-repeat: repeat-x, no-repeat;
            -webkit-mask-position: bottom;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        /* 4. Bee Animations */
        @keyframes flyAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(100px, -50px) rotate(10deg); }
            50% { transform: translate(200px, 20px) rotate(-10deg); }
            75% { transform: translate(-50px, 80px) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        @keyframes beeLanding {
            0% { transform: translate(-200px, -200px) scale(0); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .bee {
            position: absolute;
            width: 40px;
            z-index: 20;
            pointer-events: none;
        }

        .bee-static { top: 280px; left: 20%; animation: beeLanding 2s forwards 1.5s; opacity: 0; animation-fill-mode: forwards; }
        .bee-bg { top: 50%; left: 10%; opacity: 0.3; animation: flyAround 15s infinite linear; }

        .branding {
            text-align: center;
            margin-top: 40px;
            position: relative;
            z-index: 10;
        }

        .branding h1 { font-family: 'Playfair Display', serif; font-size: 70px; color: var(--honey-yellow); }
        .branding h2 { letter-spacing: 10px; font-weight: 300; text-transform: uppercase; margin-top: -10px; }

        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; max-width: 160px; margin-bottom: 20px; }
        .card h3 { color: #333; }
        .price { color: #1f7a4a; font-weight: 700; font-size: 24px; margin: 15px 0; }

        .btn-order {
            background: var(--whatsapp-green);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            display: inline-block;
        }

        .notice-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #000;
            color: #fff;
            padding: 10px;
            font-size: 10px;
            border-radius: 5px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <img src="https://cdn-icons-png.flaticon.com/512/517/517563.png" class="bee bee-bg" alt="bee">

    <div class="hero-bg">
        <div class="notice-tag">NOTICE:<br>DON'T USE WET SPOON.</div>
        <img src="https://cdn-icons-png.flaticon.com/512/517/517563.png" class="bee bee-static" alt="landing bee">
    </div>

    <div class="branding">
        <h1>S&S</h1>
        <h2>Raw Honey</h2>
    </div>

    <div class="container">
        <div class="product-grid">
            <div class="card">
                <img src="assets/Jar1.png" alt="Forest Honey">
                <h3>Organic Forest Honey</h3>
                <div class="price">₹550</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>
            <div class="card">
                <img src="assets/Jar2.png" alt="Mountain Bloom">
                <h3>Mountain Bloom - 500g</h3>
                <div class="price">₹580</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>
            <div class="card">
                <img src="assets/Jar3.png" alt="Wildflower">
                <h3>Wildflower Comb - 300g</h3>
                <div class="price">₹620</div>
                <a href="#" class="btn-order">Order on WhatsApp</a>
            </div>
        </div>
    </div>

    <div style="text-align: center; padding: 40px;">
        <p style="letter-spacing: 2px;">PURE HONEY, FROM HIVE TO HOME.</p>
        <h3 style="color: var(--honey-yellow); margin-top: 10px;">शहद नहीं, हिमाचल का जादू।</h3>
    </div>

</body>
</html>
