<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S Raw Honey</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --honey: #f4b400;
            --honey-dark: #d49a00;
            --forest: #072a23;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--forest);
            color: #fff;
            overflow-x: hidden;
        }

        /* 1. REFINED PATTERN: Minimalist hex grid that matches the dark aesthetic */
        .pattern {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="30" height="52" viewBox="0 0 30 52"><path d="M15 0l15 8.66v17.34L15 34.66 0 26V8.66L15 0z" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.5"/></svg>');
            background-size: 32px 54px;
        }

        /* 2. MATCHED HEADER: Deep organic drips */
        .hero {
            position: relative;
            height: 600px;
            overflow: hidden;
            background-color: var(--forest);
        }

        .honey-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #ffcc33 0%, var(--honey) 70%, var(--honey-dark) 100%);
            z-index: 5;
            
            /* The Mask now matches the "Himachal Ka" branding style better */
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="none"><path d="M0,0 H1200 V300 C1100,300 1050,480 950,480 C850,480 800,300 700,300 C600,300 550,480 450,480 C350,480 300,300 200,300 C100,300 50,480 0,480 Z" fill="black"/></svg>');
            -webkit-mask-size: 100% 100%;
            animation: honeySway 12s ease-in-out infinite alternate;
        }

        @keyframes honeySway {
            from { transform: scaleY(1); }
            to { transform: scaleY(1.03); }
        }

        /* 3. ALIGNED BRANDING: Positioning text to match the drip weight */
        .brand {
            position: absolute;
            top: 40%; /* Moved slightly up to clear the drip curves */
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
        }

        .brand p { 
            color: #000; 
            letter-spacing: 6px; 
            font-weight: 700; 
            margin: 0; 
            font-size: 11px; 
            opacity: 0.9;
        }

        .brand h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 110px; 
            margin: -5px 0; 
            color: #000; 
            line-height: 0.9;
            text-shadow: 0 2px 10px rgba(0,0,0,0.05);
        }

        .brand h2 { 
            letter-spacing: 10px; 
            font-size: 0.85rem; 
            color: #000; 
            margin-top: 10px; 
            font-weight: 400; 
            text-transform: uppercase;
        }

        /* FALLING DROPS: Matches the drip color exactly */
        .drop {
            position: absolute;
            background: var(--honey-dark);
            width: 14px;
            height: 14px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            z-index: 4;
            animation: fallDown 5s linear infinite;
            opacity: 0;
        }

        @keyframes fallDown {
            0% { top: 350px; opacity: 1; }
            80% { opacity: 0.8; }
            100% { top: 850px; opacity: 0; }
        }

        /* Notice Box styling */
        .notice {
            position: absolute;
            top: 25px;
            right: 30px;
            background: #000;
            color: #fff;
            padding: 10px 15px;
            font-size: 10px;
            font-weight: 700;
            border-radius: 3px;
            z-index: 50;
            border: 1px solid var(--honey);
        }

        /* Honey Dipper Positioning */
        .dipper {
            position: absolute;
            top: -20px;
            right: 15%;
            z-index: 15;
            transform-origin: top center;
            animation: swayDipper 4s ease-in-out infinite alternate;
        }

        @keyframes swayDipper {
            from { transform: rotate(-4deg); }
            to { transform: rotate(4deg); }
        }

        .dipper-stick { width: 8px; height: 220px; background: #6b3e1a; margin: 0 auto; border-radius: 4px; }
        .dipper-head { 
            width: 44px; height: 50px; 
            background: repeating-linear-gradient(0deg, #96612d, #96612d 8px, #6b3e1a 8px, #6b3e1a 12px);
            border-radius: 8px; margin-top: -8px;
        }

        /* Section Spacing */
        .products { padding: 100px 20px; text-align: center; }
        .grid {
            max-width: 1100px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .card { background: #fff; border-radius: 30px; padding: 50px 30px; color: #333; transition: 0.4s; }
        .card:hover { transform: translateY(-12px); box-shadow: 0 30px 60px rgba(0,0,0,0.4); }

        /* Dimmed Footer */
        footer {
            padding: 80px 20px;
            background: rgba(0,0,0,0.5);
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media(max-width: 768px) {
            .brand h1 { font-size: 70px; }
            .brand h2 { font-size: 0.7rem; letter-spacing: 5px; }
        }
    </style>
</head>
<body class="pattern">

    <section class="hero">
        <div class="notice">WARNING: DRY SPOON ONLY<br>PROTECT THE PURITY</div>
        
        <div class="honey-header"></div>
        
        <div class="drop" style="left: 20%; animation-delay: 0s;"></div>
        <div class="drop" style="left: 45%; animation-delay: 2.5s;"></div>
        <div class="drop" style="left: 75%; animation-delay: 1s;"></div>

        <div class="dipper">
            <div class="dipper-stick"></div>
            <div class="dipper-head"></div>
        </div>

        <div class="brand">
            <p>HIMACHAL KA</p>
            <h1>S&S</h1>
            <h2>Authentic Raw Honey</h2>
        </div>
    </section>

    <section class="products">
        <div class="grid">
            <div class="card">
                <div style="width:100px; height:120px; background:var(--honey); border-radius:10px 10px 30px 30px; margin:0 auto 20px; border:4px solid var(--honey-dark);"></div>
                <h3>Wildflower Honey</h3>
                <p style="font-size:14px; opacity:0.7;">Directly from the high-altitude meadows.</p>
                <div style="font-size:24px; font-weight:700; color:#1f7a4a; margin:15px 0;">₹550</div>
                <a href="#" style="background:#25D366; color:#fff; padding:12px 30px; border-radius:50px; text-decoration:none; font-weight:600; display:inline-block;">Order on WhatsApp</a>
            </div>
            
            </div>
    </section>

    <footer class="pattern">
        <p><strong>S&S RAW HONEY CO.</strong></p>
        <p>Pure · Natural · Unfiltered · Ethically Sourced</p>
        <p style="margin-top:20px;">© 2025 All Rights Reserved.</p>
    </footer>

</body>
</html>
